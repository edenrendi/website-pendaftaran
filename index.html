<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O2SN Kecamatan Cigombong 2026</title>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Nunito',sans-serif;background:#060f23;color:#fff;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0d1b35}::-webkit-scrollbar-thumb{background:#3b82f6;border-radius:3px}
/* Animated BG */
.bg-main{background:linear-gradient(135deg,#060f23 0%,#0d1b35 40%,#0a1628 100%);min-height:100vh;position:relative}
.bg-main::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 15%,rgba(59,130,246,.18) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(139,92,246,.12) 0%,transparent 55%),radial-gradient(ellipse at 50% 50%,rgba(16,185,129,.06) 0%,transparent 70%);pointer-events:none;z-index:0;animation:bgPulse 10s ease-in-out infinite}
@keyframes bgPulse{0%,100%{opacity:1}50%{opacity:.7}}
#stars-wrap{position:fixed;inset:0;z-index:0;pointer-events:none}
#app{position:relative;z-index:1;min-height:100vh}
/* Glass */
.glass{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:20px}
.glass-dark{background:rgba(0,0,0,.3);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px}
.glass-blue{background:rgba(59,130,246,.12);backdrop-filter:blur(20px);border:1px solid rgba(59,130,246,.25);border-radius:20px}
/* Buttons */
.btn{border:none;border-radius:10px;padding:10px 22px;font-weight:700;cursor:pointer;transition:all .25s;font-family:'Nunito',sans-serif;display:inline-flex;align-items:center;gap:7px;font-size:.88rem}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;box-shadow:0 4px 15px rgba(59,130,246,.4)}
.btn-blue:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(59,130,246,.5)}
.btn-green{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 4px 15px rgba(16,185,129,.4)}
.btn-green:hover{transform:translateY(-2px)}
.btn-red{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;box-shadow:0 4px 15px rgba(239,68,68,.4)}
.btn-red:hover{transform:translateY(-2px)}
.btn-yellow{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;box-shadow:0 4px 15px rgba(245,158,11,.4)}
.btn-yellow:hover{transform:translateY(-2px)}
.btn-ghost{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff}
.btn-ghost:hover{background:rgba(255,255,255,.14)}
.btn-sm{padding:6px 12px;font-size:.75rem;border-radius:8px}
/* Forms */
.form-input{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);color:#fff;border-radius:10px;padding:10px 14px;width:100%;transition:all .3s;font-family:'Nunito',sans-serif;font-size:.9rem}
.form-input:focus{outline:none;border-color:#3b82f6;background:rgba(59,130,246,.15);box-shadow:0 0 0 3px rgba(59,130,246,.2)}
.form-input::placeholder{color:rgba(255,255,255,.35)}
.form-input option{background:#1a2f5e;color:#fff}
.form-label{color:rgba(255,255,255,.85);font-size:.82rem;font-weight:700;margin-bottom:5px;display:block}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;animation:fadeIn .2s ease}
.modal-box{background:linear-gradient(135deg,#1a2f5e,#0d1f3c);border:1px solid rgba(59,130,246,.3);border-radius:24px;animation:slideUp .3s ease;width:100%;box-shadow:0 40px 80px rgba(0,0,0,.5);margin:auto}
.modal-box::-webkit-scrollbar{width:4px}
.modal-box::-webkit-scrollbar-thumb{background:rgba(59,130,246,.5);border-radius:2px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
/* Toast */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:linear-gradient(135deg,#10b981,#059669);color:#fff;padding:14px 20px;border-radius:14px;font-weight:700;animation:slideInR .3s ease;box-shadow:0 10px 30px rgba(16,185,129,.4);max-width:320px;display:flex;align-items:center;gap:10px}
.toast.error{background:linear-gradient(135deg,#ef4444,#dc2626);box-shadow:0 10px 30px rgba(239,68,68,.4)}
.toast.info{background:linear-gradient(135deg,#3b82f6,#2563eb);box-shadow:0 10px 30px rgba(59,130,246,.4)}
.toast.warning{background:linear-gradient(135deg,#f59e0b,#d97706);box-shadow:0 10px 30px rgba(245,158,11,.4)}
@keyframes slideInR{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
/* Nav */
.navbar{background:rgba(6,15,35,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(59,130,246,.2);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
/* Cards */
.sport-card{background:linear-gradient(135deg,rgba(255,255,255,.09),rgba(255,255,255,.04));border:2px solid transparent;border-radius:16px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.sport-card:hover{transform:translateY(-4px) scale(1.02);border-color:rgba(59,130,246,.6);box-shadow:0 20px 40px rgba(59,130,246,.3)}
.sport-card.selected{border-color:#3b82f6;background:linear-gradient(135deg,rgba(59,130,246,.3),rgba(139,92,246,.2));box-shadow:0 0 20px rgba(59,130,246,.4)}
.stat-card{background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:20px;transition:all .3s}
.stat-card:hover{transform:translateY(-3px);border-color:rgba(59,130,246,.4);box-shadow:0 12px 30px rgba(0,0,0,.3)}
/* Table */
.data-table{width:100%;border-collapse:collapse}
.data-table th{background:rgba(59,130,246,.2);color:#93c5fd;padding:10px 14px;text-align:left;font-size:.78rem;font-weight:700;white-space:nowrap}
.data-table td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.05);font-size:.8rem;vertical-align:middle}
.data-table tr:hover td{background:rgba(255,255,255,.03)}
/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700}
.badge-green{background:rgba(16,185,129,.2);color:#34d399;border:1px solid rgba(16,185,129,.3)}
.badge-yellow{background:rgba(245,158,11,.2);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.badge-blue{background:rgba(59,130,246,.2);color:#93c5fd;border:1px solid rgba(59,130,246,.3)}
.badge-red{background:rgba(239,68,68,.2);color:#f87171;border:1px solid rgba(239,68,68,.3)}
/* Upload */
.upload-zone{border:2px dashed rgba(59,130,246,.4);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .3s;background:rgba(59,130,246,.05);display:flex;align-items:center;gap:10px;min-height:52px}
.upload-zone:hover{border-color:#3b82f6;background:rgba(59,130,246,.15)}
.file-thumb{width:100%;height:80px;background:rgba(255,255,255,.05);border:1px solid rgba(59,130,246,.3);border-radius:10px;overflow:hidden;position:relative;margin-top:6px}
.file-thumb img{width:100%;height:100%;object-fit:cover}
.file-thumb .overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;gap:6px;opacity:0;transition:.2s}
.file-thumb:hover .overlay{opacity:1}
.file-action-btn{background:rgba(59,130,246,.85);border:none;color:#fff;cursor:pointer;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:.2s}
.file-action-btn:hover{transform:scale(1.12)}
.file-action-btn.del{background:rgba(239,68,68,.85)}
/* Sidebar admin */
.admin-sidebar{width:240px;flex-shrink:0;background:linear-gradient(180deg,rgba(26,47,94,.85),rgba(13,31,71,.85));backdrop-filter:blur(20px);border-right:1px solid rgba(139,92,246,.2);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-btn{display:flex;align-items:center;gap:11px;width:100%;padding:12px 16px;margin-bottom:4px;border-radius:12px;border:none;background:transparent;color:rgba(255,255,255,.55);cursor:pointer;font-weight:700;font-size:.88rem;transition:all .25s;border-left:3px solid transparent;text-align:left}
.sidebar-btn:hover{background:rgba(139,92,246,.15);color:#c4b5fd;border-left-color:#c4b5fd}
.sidebar-btn.active{background:rgba(139,92,246,.3);color:#a78bfa;border-left-color:#8b5cf6}
/* Animations */
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-20px) rotate(180deg)}}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
.section-title{font-family:'Poppins',sans-serif;font-weight:900;background:linear-gradient(135deg,#60a5fa,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
/* Progress bar */
.progress-bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:3px;transition:width .5s ease}
/* Info board */
.info-board{background:linear-gradient(135deg,rgba(245,158,11,.18),rgba(217,119,6,.1));border:1px solid rgba(245,158,11,.4);border-radius:16px;padding:20px;animation:slideUp .5s ease}
/* Gender btn */
.gender-btn{padding:10px 20px;border-radius:8px;border:2px solid rgba(255,255,255,.2);cursor:pointer;font-weight:700;transition:all .3s;background:transparent;color:rgba(255,255,255,.55);font-family:'Nunito',sans-serif;font-size:.9rem}
.gender-btn.active{background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-color:#3b82f6;color:#fff;box-shadow:0 4px 12px rgba(59,130,246,.3)}
/* Print */
@media print{
  #print-target{display:block!important}
  body > *:not(#print-target){display:none!important}
  #print-target{position:fixed;inset:0;background:#fff;z-index:99999;padding:0}
}
</style>
</head>
<body class="bg-main">
<div id="stars-wrap"></div>
<div id="app"></div>
<div class="toast-wrap" id="toast-wrap"></div>
<div id="print-target" style="display:none"></div>

<script>
// ═══════════════════════════════════════════════════════
// LOCAL STORAGE DB
// ═══════════════════════════════════════════════════════
let _db = [];
try { _db = JSON.parse(localStorage.getItem('o2sn_db') || '[]'); } catch(e){ _db=[]; }
function _saveDb(){ try{ localStorage.setItem('o2sn_db', JSON.stringify(_db)); }catch(e){} }

const dataSdk = {
  _handler: null,
  init(handler){ this._handler=handler; handler.onDataChanged(_db.slice()); return {isOk:true}; },
  _notify(){ if(this._handler) this._handler.onDataChanged(_db.slice()); },
  async create(data){ const rec={...data,__backendId:'id_'+Date.now()+'_'+Math.random().toString(36).substr(2,5)}; _db.push(rec); _saveDb(); this._notify(); return {isOk:true,data:rec}; },
  async update(data){ const i=_db.findIndex(r=>r.__backendId===data.__backendId); if(i<0)return{isOk:false}; _db[i]={...data}; _saveDb(); this._notify(); return{isOk:true,data:_db[i]}; },
  async delete(data){ const i=_db.findIndex(r=>r.__backendId===data.__backendId); if(i<0)return{isOk:false}; _db.splice(i,1); _saveDb(); this._notify(); return{isOk:true}; }
};

let _cfg = {};
try{ _cfg=JSON.parse(localStorage.getItem('o2sn_cfg')||'{}'); }catch(e){}
const elementSdk = {
  getConfig(){ return _cfg; },
  async setConfig(patch){ _cfg={..._cfg,...patch}; localStorage.setItem('o2sn_cfg',JSON.stringify(_cfg)); return {isOk:true}; }
};

// ═══════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════
const APP = {
  currentUser: null, currentPage: 'home',
  allRecords:[], schools:[], students:[],
  config: {
    event_year:'2026', ketua_panitia:'H. Ahmad Subagja, S.Pd., M.M.',
    nip_ketua:'196804121990031005', informasi_penting:'',
    logo_url: '', ..._cfg
  }
};
let adminPassword = 'admin123';

const SPORTS = {
  'Kids Athletics':  {emoji:'🏃',color:'#f59e0b',desc:'Lari, Lempar, Lompat'},
  'Renang':          {emoji:'🏊',color:'#0ea5e9',desc:'Gaya Bebas & Gaya Dada'},
  'Bulutangkis':     {emoji:'🏸',color:'#10b981',desc:'Tunggal & Ganda'},
  'Pencak Silat':    {emoji:'🥋',color:'#8b5cf6',desc:'Seni & Tanding'},
  'Senam':           {emoji:'🤸',color:'#ec4899',desc:'Artistik & Ritmik'}
};
const RELIGIONS = ['Islam','Kristen','Katolik','Hindu','Budha','Konghucu'];
const GRADES = ['1','2','3','4','5','6'];
const tempFiles = {};

// Data handler
const dataHandler = {
  onDataChanged(data){
    APP.allRecords = data;
    APP.schools   = data.filter(r=>r.type==='school');
    APP.students  = data.filter(r=>r.type==='student');
    const pw = data.find(r=>r.type==='admin_config');
    if(pw) adminPassword = pw.admin_password || adminPassword;
    // sync config from db
    const cfg = data.find(r=>r.type==='app_config');
    if(cfg){ Object.assign(APP.config, cfg); }
    refreshCurrentView();
  }
};
dataSdk.init(dataHandler);

// ═══════════════════════════════════════════════════════
// STARS
// ═══════════════════════════════════════════════════════
(function createStars(){
  const c=document.getElementById('stars-wrap');
  for(let i=0;i<90;i++){
    const s=document.createElement('div');
    const sz=Math.random()*3+1;
    s.style.cssText=`position:absolute;border-radius:50%;width:${sz}px;height:${sz}px;background:white;top:${Math.random()*100}%;left:${Math.random()*100}%;animation:twinkle ${2+Math.random()*4}s ease-in-out infinite;animation-delay:${Math.random()*4}s;opacity:${.1+Math.random()*.6}`;
    c.appendChild(s);
  }
})();

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
function showToast(msg, type='success', duration=3500){
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = `toast ${type!=='success'?type:''}`;
  const icon = {success:'✅',error:'❌',info:'ℹ️',warning:'⚠️'}[type]||'✅';
  t.innerHTML = `<span style="font-size:1.2rem">${icon}</span><span>${msg}</span>`;
  wrap.appendChild(t);
  setTimeout(()=>{ t.style.animation='slideInR .3s ease reverse'; setTimeout(()=>t.remove(),300); }, duration);
}

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(iso){ if(!iso)return'-'; const d=new Date(iso); return d.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }
function fmtDateShort(iso){ if(!iso)return'-'; return new Date(iso).toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function genCode(){ return 'O2SN-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).substr(2,5).toUpperCase(); }
function closeModal(id){ const el=document.getElementById(id); if(el){ el.style.animation='fadeOut .2s ease'; setTimeout(()=>el.parentNode&&el.parentNode.removeChild(el),200); } }
function refreshCurrentView(){
  const p=APP.currentPage;
  if(p==='home')renderHome();
  else if(p==='admin')renderAdmin();
  else if(p==='coordinator')renderCoordinator();
}

// ═══════════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════════
function renderHome(){
  APP.currentPage='home';
  const yr = APP.config.event_year||'2026';
  const info = APP.config.informasi_penting||'';
  const logoUrl = APP.config.logo_url||'';
  const app = document.getElementById('app');
  app.innerHTML = `
  <div style="min-height:100vh;display:flex;flex-direction:column">
    <!-- NAVBAR -->
    <nav class="navbar">
      <div style="display:flex;align-items:center;gap:12px">
        ${logoUrl
          ? `<img src="${logoUrl}" style="width:44px;height:44px;object-fit:contain;border-radius:10px;background:#fff;padding:2px">`
          : `<div style="width:44px;height:44px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem">🏆</div>`}
        <div>
          <div style="font-family:'Poppins';font-weight:800;font-size:1rem;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">O2SN ${yr}</div>
          <div style="font-size:.7rem;color:rgba(255,255,255,.5)">Kec. Cigombong · Kab. Bogor</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-green btn-sm" onclick="openRegModal()"><i data-lucide="user-plus" style="width:14px;height:14px"></i> Daftar Akun</button>
        <button class="btn btn-blue btn-sm" onclick="openLoginModal('coordinator')"><i data-lucide="log-in" style="width:14px;height:14px"></i> Koordinator</button>
        <button class="btn btn-sm" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff" onclick="openLoginModal('admin')"><i data-lucide="shield" style="width:14px;height:14px"></i> Admin</button>
      </div>
    </nav>

    <!-- HERO -->
    <div style="flex:1;padding:40px 24px">
      <div style="max-width:1200px;margin:0 auto">

        <!-- INFO BOARD -->
        ${info ? `
        <div class="info-board" style="margin-bottom:32px">
          <div style="display:flex;gap:12px;align-items:flex-start">
            <div style="font-size:2rem;animation:bounce 2s infinite">📢</div>
            <div>
              <div style="font-weight:800;color:#fbbf24;margin-bottom:6px;font-size:1rem">📋 Pengumuman & Informasi Penting</div>
              <div style="color:rgba(255,255,255,.85);line-height:1.7;font-size:.92rem;white-space:pre-line">${esc(info)}</div>
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">
            ${['📅 Segera mendaftarkan peserta','✅ Pastikan berkas lengkap','📞 Hubungi koordinator sekolah'].map(t=>`<span style="background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.35);border-radius:20px;padding:4px 12px;font-size:.72rem;font-weight:700;color:#fbbf24">${t}</span>`).join('')}
          </div>
        </div>` : ''}

        <!-- HERO TITLE -->
        <div style="text-align:center;margin-bottom:60px;position:relative">
          <div style="position:absolute;width:300px;height:300px;background:#3b82f6;border-radius:50%;opacity:.04;top:-80px;left:-80px;animation:float 6s ease-in-out infinite"></div>
          <div style="position:absolute;width:200px;height:200px;background:#8b5cf6;border-radius:50%;opacity:.04;bottom:-40px;right:-60px;animation:float 8s ease-in-out infinite reverse"></div>
          <div style="display:inline-flex;align-items:center;gap:8px;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);border-radius:30px;padding:6px 18px;margin-bottom:20px">
            <span style="width:8px;height:8px;background:#10b981;border-radius:50%;animation:twinkle 1.5s infinite"></span>
            <span style="font-size:.8rem;color:#93c5fd;font-weight:700">Pendaftaran Resmi ${yr}</span>
          </div>
          <h1 class="section-title" style="font-family:'Poppins';font-weight:900;font-size:clamp(1.6rem,4vw,3rem);line-height:1.2;margin-bottom:10px">OLIMPIADE OLAHRAGA SISWA NASIONAL</h1>
          <h2 style="font-family:'Poppins';font-weight:700;font-size:clamp(1rem,2vw,1.5rem);color:#93c5fd;margin-bottom:8px">O2SN Tingkat Kecamatan Cigombong</h2>
          <p style="color:rgba(255,255,255,.55);font-size:.95rem;margin-bottom:32px">Kabupaten Bogor · Tahun ${yr}</p>
          <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
            <button class="btn btn-green" style="font-size:1rem;padding:14px 28px" onclick="openRegModal()"><i data-lucide="clipboard-list" style="width:18px;height:18px"></i> Daftar Sekarang</button>
            <button class="btn btn-blue" style="font-size:1rem;padding:14px 28px" onclick="openLoginModal('coordinator')"><i data-lucide="log-in" style="width:18px;height:18px"></i> Login Koordinator</button>
          </div>
        </div>

function togglePw(inputId,iconId){
  const inp=document.getElementById(inputId), ico=document.getElementById(iconId);
  if(!inp)return;
  if(inp.type==='password'){ inp.type='text'; ico?.setAttribute('data-lucide','eye-off'); }
  else { inp.type='password'; ico?.setAttribute('data-lucide','eye'); }
  lucide.createIcons();
}

function doLogin(type){
  const btn=document.getElementById('l-btn');
  if(btn){ btn.disabled=true; btn.innerHTML='<i data-lucide="loader" style="width:16px;height:16px;animation:spin 1s linear infinite"></i> Memproses...'; lucide.createIcons(); }
  setTimeout(()=>{
    if(type==='admin'){
      const pw=document.getElementById('l-pw')?.value||'';
      if(pw===adminPassword){ APP.currentUser={type:'admin'}; closeModal('login-modal'); showToast('Selamat datang, Administrator! 👋'); renderAdmin(); }
      else { showToast('Password salah!','error'); if(btn){btn.disabled=false;btn.innerHTML='<i data-lucide="log-in" style="width:16px;height:16px"></i> Masuk';lucide.createIcons();} }
    } else {
      const npsn=document.getElementById('l-npsn')?.value?.trim()||'';
      const pw=document.getElementById('l-pw')?.value||'';
      const school=APP.schools.find(s=>s.npsn===npsn);
      if(!school){ showToast('NPSN tidak ditemukan!','error'); if(btn){btn.disabled=false;btn.innerHTML='<i data-lucide="log-in" style="width:16px;height:16px"></i> Masuk';lucide.createIcons();} return; }
      if(pw!==school.password_hash){ showToast('Password salah!','error'); if(btn){btn.disabled=false;btn.innerHTML='<i data-lucide="log-in" style="width:16px;height:16px"></i> Masuk';lucide.createIcons();} return; }
      APP.currentUser={type:'coordinator',npsn,schoolName:school.school_name,schoolRecord:school};
      closeModal('login-modal'); showToast(`Selamat datang, ${school.school_name}! 🏫`); renderCoordinator();
    }
  },700);
}

async function doRegister(){
  const v=id=>document.getElementById(id)?.value?.trim()||'';
  const school=v('rg-school'),npsn=v('rg-npsn'),kec=v('rg-kec'),kab=v('rg-kab'),hp=v('rg-hp'),pw=v('rg-pw');
  const agree=document.getElementById('rg-agree')?.checked;
  if(!school||!npsn||!kec||!kab||!hp||!pw){ showToast('Semua kolom wajib diisi!','error'); return; }
  if(!agree){ showToast('Centang persetujuan terlebih dahulu!','error'); return; }
  if(pw.length<6){ showToast('Password minimal 6 karakter!','error'); return; }
  if(APP.schools.find(s=>s.npsn===npsn)){ showToast('NPSN sudah terdaftar!','error'); return; }
  const btn=document.getElementById('rg-btn');
  if(btn){ btn.disabled=true; btn.innerHTML='<i data-lucide="loader" style="width:16px;height:16px;animation:spin 1s linear infinite"></i> Memproses...'; lucide.createIcons(); }
  try{
    const r=await dataSdk.create({type:'school',school_name:school,npsn,kecamatan:kec,kabupaten:kab,phone:hp,password_hash:pw,status:'active',reg_date:new Date().toISOString()});
    if(r.isOk){ closeModal('reg-modal'); showToast(`✅ ${school} berhasil terdaftar!`); }
    else showToast('Gagal registrasi!','error');
  }catch(e){ showToast('Terjadi kesalahan!','error'); }
  finally{ if(btn){btn.disabled=false;btn.innerHTML='<i data-lucide="user-plus" style="width:16px;height:16px"></i> Registrasi';lucide.createIcons();} }
}

async function doReset(){
  const npsn=document.getElementById('rs-npsn')?.value?.trim()||'';
  const pw1=document.getElementById('rs-pw1')?.value||'';
  const pw2=document.getElementById('rs-pw2')?.value||'';
  if(!npsn||!pw1||!pw2){ showToast('Semua kolom wajib!','error'); return; }
  if(pw1!==pw2){ showToast('Password tidak sama!','error'); return; }
  if(pw1.length<6){ showToast('Min 6 karakter!','error'); return; }
  const school=APP.schools.find(s=>s.npsn===npsn);
  if(!school){ showToast('NPSN tidak ditemukan!','error'); return; }
  const r=await dataSdk.update({...school,password_hash:pw1});
  if(r.isOk){ closeModal('reset-modal'); showToast('Password berhasil direset ✅'); openLoginModal('coordinator'); }
  else showToast('Gagal reset!','error');
}

window.selectedSport=null; window.selectedKategori=null;
function selectSport(name){
  Object.keys(SPORTS).forEach(s=>{ document.getElementById(`sp-sport-${s}`)?.classList.toggle('selected',s===name); });
  window.selectedSport=name;
  document.getElementById('kategori-section').style.display='block';
  window.selectedKategori=null;
  ['putra','putri'].forEach(k=>document.getElementById(`kat-${k}`)?.classList.remove('active'));
}
function selectKategori(kat){
  ['putra','putri'].forEach(k=>{ document.getElementById(`kat-${k}`)?.classList.toggle('active',k.charAt(0).toUpperCase()+k.slice(1)===kat); });
  window.selectedKategori=kat;
}

function handleFileUpload(inputId){
  const input=document.getElementById(inputId);
  const file=input?.files[0];
  if(!file)return;
  if(!['image/jpeg','image/png','image/jpg'].includes(file.type)){
    showToast('❌ Hanya JPG/PNG yang diizinkan!','error'); input.value=''; return;
  }
  if(file.size>5242880){ showToast('❌ Ukuran file maksimal 5MB!','error'); input.value=''; return; }
  const reader=new FileReader();
  reader.onload=(e)=>{
    tempFiles[inputId]=e.target.result;
    const thumb=document.getElementById(`${inputId}-thumb`);
    const img=document.getElementById(`${inputId}-img`);
    const txt=document.getElementById(`${inputId}-text`);
    if(thumb) thumb.style.display='block';
    if(img) img.src=e.target.result;
    if(txt) txt.textContent='✓ File terpilih';
    lucide.createIcons();
  };
  reader.readAsDataURL(file);
}
function removeFile(inputId){
  delete tempFiles[inputId];
  document.getElementById(inputId).value='';
  const thumb=document.getElementById(`${inputId}-thumb`);
  const txt=document.getElementById(`${inputId}-text`);
  if(thumb) thumb.style.display='none';
  if(txt) txt.textContent='Klik untuk upload';
}
function previewFile(inputId){
  const data=tempFiles[inputId]; if(!data){ showToast('Tidak ada file','warning'); return; }
  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px';
  ov.innerHTML='<img src="'+data+'" style="max-width:92%;max-height:80vh;object-fit:contain;border-radius:8px"/>'
    +'<button onclick="this.parentNode.remove()" style="background:#3b82f6;border:none;color:#fff;padding:10px 28px;border-radius:8px;cursor:pointer;font-weight:700;font-size:14px">Tutup</button>';
  document.body.appendChild(ov);
}

async function submitStudent(){
  if(!window.selectedSport){ showToast('Pilih cabang olahraga!','error'); return; }
  if(!window.selectedKategori){ showToast('Pilih kategori Putra/Putri!','error'); return; }
  const v=id=>document.getElementById(id)?.value?.trim()||'';
  const nama=v('sp-nama'),nisn=v('sp-nisn'),tempat=v('sp-tempat'),tgl=v('sp-tgl'),gender=v('sp-gender'),agama=v('sp-agama'),kelas=v('sp-kelas'),guru=v('sp-guru'),hp=v('sp-hp'),nipkoord=v('sp-nip-koord');
  if(!nama||!nisn||!tempat||!tgl||!gender||!agama||!kelas||!guru||!hp){ showToast('Semua kolom data diri wajib diisi!','error'); return; }
  if(nisn.length!==10){ showToast('NISN harus 10 digit!','error'); return; }
  const btn=document.getElementById('sp-btn');
  if(btn){ btn.disabled=true; btn.innerHTML='<i data-lucide="loader" style="width:16px;height:16px;animation:spin 1s linear infinite"></i> Mendaftarkan...'; lucide.createIcons(); }
  try{
    const fileFields={};
    ['photo','kk','akta','rapot','surat'].forEach(f=>{ if(tempFiles[`sp-${f}`]) fileFields[f]=tempFiles[`sp-${f}`]; });
    const data={
      type:'student',student_name:nama,nisn:nisn,birth_place:tempat,birth_date:tgl,gender,religion:agama,grade:kelas,
      sport:window.selectedSport,sport_gender:window.selectedKategori,
      teacher_name:guru,teacher_phone:hp,teacher_nip:nipkoord,
      verified:'false',reg_date:new Date().toISOString(),
      coordinator_npsn:APP.currentUser.npsn,school_name:APP.currentUser.schoolName,
      ...fileFields
    };
    const r=await dataSdk.create(data);
    if(r.isOk){
      closeModal('add-student-modal');
      showToast('✅ Peserta berhasil didaftarkan! Menunggu verifikasi admin.');
      Object.keys(tempFiles).forEach(k=>delete tempFiles[k]);
      window.selectedSport=null; window.selectedKategori=null;
      renderCoordinator();
    } else showToast('Gagal mendaftar!','error');
  }catch(e){ showToast('Terjadi kesalahan: '+e.message,'error'); }
  finally{ if(btn){btn.disabled=false;btn.innerHTML='<i data-lucide="user-plus" style="width:16px;height:16px"></i> Daftarkan Peserta';lucide.createIcons();} }
}

// ── Capitalize Each Word helper ──
function titleCase(str){
  if(!str)return'';
  return str.replace(/\w\S*/g,function(w){return w.charAt(0).toUpperCase()+w.substr(1).toLowerCase();});
}

function adminTab(tab){
  document.querySelectorAll('.sidebar-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+tab)?.classList.add('active');
  const c=document.getElementById('admin-content'); if(!c)return;
  if(tab==='overview')renderOverview(c);
  else if(tab==='students')renderStudents(c);
  else if(tab==='schools')renderSchools(c);
  else if(tab==='recap')renderRecap(c);
  else if(tab==='analytics')renderAnalytics(c);
  else if(tab==='settings')renderSettings(c);
}

function toggleRecapDetail(sport){
  const el=document.getElementById('recap-detail-'+sport.replace(/\s/g,'_'));
  if(!el)return;
  const isHidden=el.style.display==='none';
  el.style.display=isHidden?'block':'none';
  const btn=document.getElementById('recap-toggle-'+sport.replace(/\s/g,'_'));
  if(btn){btn.innerHTML=isHidden?'<i data-lucide="eye-off" style="width:13px;height:13px"></i> Sembunyikan':'<i data-lucide="eye" style="width:13px;height:13px"></i> Tampilkan';}
  lucide.createIcons();
}

function filterRecapRows(sport){
  const key=sport.replace(/\s/g,'_');
  const val=(document.getElementById('recap-filter-'+key)?.value||'').toLowerCase();
  const status=document.getElementById('recap-fstatus-'+key)?.value||'';
  const kategori=document.getElementById('recap-fkat-'+key)?.value||'';
  const tbody=document.getElementById('recap-tbody-'+key);
  if(!tbody)return;
  let visIdx=1;
  Array.from(tbody.querySelectorAll('tr[data-row]')).forEach(tr=>{
    const nama=(tr.dataset.nama||'').toLowerCase();
    const sekolah=(tr.dataset.sekolah||'').toLowerCase();
    const sts=tr.dataset.status||'';
    const kat=tr.dataset.kat||'';
    const show=(!val||(nama.includes(val)||sekolah.includes(val)))&&(!status||sts===status)&&(!kategori||kat===kategori);
    tr.style.display=show?'':'none';
    if(show){tr.querySelector('.row-no').textContent=visIdx++;}
  });
}

  const sportStudents=APP.students.filter(st=>st.sport===sport).sort((a,b)=>a.school_name.localeCompare(b.school_name));
  const wb=XLSX.utils.book_new();
  const rows=[

  ];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),sport.substring(0,28));

function filterModalRows(){
  const val=(document.getElementById('modal-filter-nama')?.value||'').toLowerCase();
  const kat=document.getElementById('modal-filter-kat')?.value||'';
  const status=document.getElementById('modal-filter-status')?.value||'';
  const tbody=document.getElementById('modal-recap-tbody');
  if(!tbody)return;
  let idx=1;
  Array.from(tbody.querySelectorAll('tr[data-row]')).forEach(tr=>{
    const nama=(tr.dataset.nama||'').toLowerCase();
    const sekolah=(tr.dataset.sekolah||'').toLowerCase();
    const show=(!val||(nama.includes(val)||sekolah.includes(val)))&&(!kat||tr.dataset.kat===kat)&&(!status||tr.dataset.status===status);
    tr.style.display=show?'':'none';
    if(show){tr.querySelector('.row-no').textContent=idx++;}
  });
}

async function saveSettings(){
  const ketua=document.getElementById('set-ketua')?.value?.trim()||'';
  const nip=document.getElementById('set-nip')?.value?.trim()||'';
  const year=document.getElementById('set-year')?.value?.trim()||'2026';
  if(!ketua||!nip){ showToast('Nama dan NIP wajib!','error'); return; }
  if(!/^\d{4}$/.test(year)||parseInt(year)<2020||parseInt(year)>2099){ showToast('Tahun tidak valid (2020-2099)!','error'); return; }
  APP.config.ketua_panitia=ketua; APP.config.nip_ketua=nip; APP.config.event_year=year;
  await elementSdk.setConfig({ketua_panitia:ketua,nip_ketua:nip,event_year:year});
  showToast('Pengaturan disimpan dan tahun diperbarui! Refresh halaman jika perlu.','success');
  refreshCurrentView();
}
async function saveInfo(){
  const info=document.getElementById('set-info')?.value?.trim()||'';
  APP.config.informasi_penting=info;
  await elementSdk.setConfig({informasi_penting:info});
  showToast('Pengumuman disimpan ✅');
  renderHome(); renderAdmin();
}
function uploadLogo(){
  const file=document.getElementById('logo-file')?.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    APP.config.logo_url=e.target.result;
    await elementSdk.setConfig({logo_url:e.target.result});
    showToast('Logo berhasil diupload ✅');
    adminTab('settings');
  };
  reader.readAsDataURL(file);
}
async function removeLogo(){
  APP.config.logo_url='';
  await elementSdk.setConfig({logo_url:''});
  showToast('Logo dihapus','info');
  adminTab('settings');
}
async function changeAdminPw(){
  const old=document.getElementById('pw-old')?.value||'';
  const nw=document.getElementById('pw-new')?.value||'';
  const nw2=document.getElementById('pw-new2')?.value||'';
  if(!old||!nw||!nw2){ showToast('Semua kolom wajib!','error'); return; }
  if(old!==adminPassword){ showToast('Password lama salah!','error'); return; }
  if(nw!==nw2){ showToast('Konfirmasi tidak cocok!','error'); return; }
  if(nw.length<6){ showToast('Min 6 karakter!','error'); return; }
  const existing=APP.allRecords.find(r=>r.type==='admin_config');
  const r=existing?await dataSdk.update({...existing,admin_password:nw}):await dataSdk.create({type:'admin_config',admin_password:nw});
  if(r.isOk){ adminPassword=nw; showToast('Password admin berhasil diubah ✅'); ['pw-old','pw-new','pw-new2'].forEach(id=>{ const el=document.getElementById(id); if(el)el.value=''; }); }
  else showToast('Gagal ubah password!','error');
}

function updatePreviewOverlay(){
  const ttdSize=document.getElementById('ttd-size');
  const ttdOp=document.getElementById('ttd-opacity');
  const stempelSize=document.getElementById('stempel-size');
  const stempelOp=document.getElementById('stempel-opacity');
  if(ttdSize){ document.getElementById('ttd-size-val').textContent=ttdSize.value+'px'; }
  if(ttdOp){ document.getElementById('ttd-opacity-val').textContent=ttdOp.value+'%'; }
  if(stempelSize){ document.getElementById('stempel-size-val').textContent=stempelSize.value+'px'; }
  if(stempelOp){ document.getElementById('stempel-opacity-val').textContent=stempelOp.value+'%'; }
  const ttdImg=document.getElementById('prev-ttd');
  const stempelImg=document.getElementById('prev-stempel');
  if(ttdImg&&ttdSize) ttdImg.style.width=ttdSize.value+'px';
  if(ttdImg&&ttdOp) ttdImg.style.opacity=ttdOp.value/100;
  if(stempelImg&&stempelSize) stempelImg.style.width=stempelSize.value+'px';
  if(stempelImg&&stempelOp) stempelImg.style.opacity=stempelOp.value/100;
}
async function saveOverlaySettings(){
  const ttdSize=parseInt(document.getElementById('ttd-size')?.value||120);
  const ttdOp=parseFloat((document.getElementById('ttd-opacity')?.value||90)/100);
  const stempelSize=parseInt(document.getElementById('stempel-size')?.value||110);
  const stempelOp=parseFloat((document.getElementById('stempel-opacity')?.value||75)/100);
  APP.config.ttd_size=ttdSize; APP.config.ttd_opacity=ttdOp;
  APP.config.stempel_size=stempelSize; APP.config.stempel_opacity=stempelOp;
  await elementSdk.setConfig({ttd_size:ttdSize,ttd_opacity:ttdOp,stempel_size:stempelSize,stempel_opacity:stempelOp});
  showToast('Ukuran & opacity disimpan ✅');
}

// ── Drag & drop di pratinjau ──
let _dragTarget=null,_dragStartX=0,_dragStartY=0,_dragImgX=0,_dragImgY=0;
function startDrag(e,who){
  e.preventDefault();
  const img=document.getElementById('prev-'+who); if(!img)return;
  _dragTarget=who;
  _dragStartX=e.clientX; _dragStartY=e.clientY;
  _dragImgX=parseInt(img.style.left)||0;
  _dragImgY=parseInt(img.style.top)||0;
  img.style.cursor='grabbing';
  document.addEventListener('mousemove',onDragMove);
  document.addEventListener('mouseup',onDragEnd);
}
function startDragTouch(e,who){
  const t=e.touches[0];
  const img=document.getElementById('prev-'+who); if(!img)return;
  _dragTarget=who;
  _dragStartX=t.clientX; _dragStartY=t.clientY;
  _dragImgX=parseInt(img.style.left)||0;
  _dragImgY=parseInt(img.style.top)||0;
  document.addEventListener('touchmove',onDragMoveTouch,{passive:false});
  document.addEventListener('touchend',onDragEndTouch);
}
function onDragMove(e){
  if(!_dragTarget)return;
  const img=document.getElementById('prev-'+_dragTarget); if(!img)return;
  const area=document.getElementById('stamp-area'); if(!area)return;
  const rect=area.getBoundingClientRect();
  let nx=_dragImgX+(e.clientX-_dragStartX);
  let ny=_dragImgY+(e.clientY-_dragStartY);
  // clamp inside area
  nx=Math.max(0,Math.min(nx,rect.width-20));
  ny=Math.max(0,Math.min(ny,rect.height-20));
  img.style.left=nx+'px'; img.style.top=ny+'px';
}
function onDragMoveTouch(e){
  e.preventDefault();
  const t=e.touches[0];
  if(!_dragTarget)return;
  const img=document.getElementById('prev-'+_dragTarget); if(!img)return;
  const area=document.getElementById('stamp-area'); if(!area)return;
  const rect=area.getBoundingClientRect();
  let nx=_dragImgX+(t.clientX-_dragStartX);
  let ny=_dragImgY+(t.clientY-_dragStartY);
  nx=Math.max(0,Math.min(nx,rect.width-20));
  ny=Math.max(0,Math.min(ny,rect.height-20));
  img.style.left=nx+'px'; img.style.top=ny+'px';
}
function onDragEnd(){
  if(_dragTarget){ const img=document.getElementById('prev-'+_dragTarget); if(img)img.style.cursor='grab'; }
  _dragTarget=null;
  document.removeEventListener('mousemove',onDragMove);
  document.removeEventListener('mouseup',onDragEnd);
}
function onDragEndTouch(){
  _dragTarget=null;
  document.removeEventListener('touchmove',onDragMoveTouch);
  document.removeEventListener('touchend',onDragEndTouch);
}
async function saveStampPosition(){
  const ttdImg=document.getElementById('prev-ttd');
  const stempelImg=document.getElementById('prev-stempel');
  const patch={};
  if(ttdImg){ patch.ttd_x=parseInt(ttdImg.style.left)||0; patch.ttd_y=parseInt(ttdImg.style.top)||0; APP.config.ttd_x=patch.ttd_x; APP.config.ttd_y=patch.ttd_y; }
  if(stempelImg){ patch.stempel_x=parseInt(stempelImg.style.left)||0; patch.stempel_y=parseInt(stempelImg.style.top)||0; APP.config.stempel_x=patch.stempel_x; APP.config.stempel_y=patch.stempel_y; }

}

function previewBerkasState(){
  const allBerkas=['photo','kk','akta','rapot','surat'];
  const labelMap={photo:'Foto Peserta (2×3)',kk:'Kartu Keluarga (KK)',akta:'Akta Kelahiran',rapot:'Rapor Terakhir',surat:'Surat Aktif Sekolah'};
  allBerkas.forEach(k=>{
    const cb=document.getElementById('berkas-'+k);
    const lbl=cb?.closest('label');
    if(!lbl)return;
    const statusEl=lbl.querySelector('div > div:last-child');
    if(cb.checked){
      lbl.style.background='rgba(52,211,153,.12)';
      lbl.style.borderColor='rgba(52,211,153,.4)';
      if(statusEl){statusEl.style.color='#34d399';statusEl.textContent='✅ Aktif';}
    } else {
      lbl.style.background='rgba(255,255,255,.04)';
      lbl.style.borderColor='rgba(255,255,255,.12)';
      if(statusEl){statusEl.style.color='rgba(255,255,255,.4)';statusEl.textContent='⭕ Nonaktif';}
    }
  });

  ['photo','kk','akta','rapot','surat'].forEach(k=>{
    const cb=document.getElementById('berkas-'+k);
    if(cb){cb.checked=state;}

}
async function saveBerkasAktif(){
  const allBerkas=['photo','kk','akta','rapot','surat'];
  const active=allBerkas.filter(k=>{
    const cb=document.getElementById('berkas-'+k);
    return cb&&cb.checked;

  await elementSdk.setConfig({berkas_aktif:json});

async function doDelete(type, id){
  if(type==='sekolah'){
    const school=APP.schools.find(s=>s.__backendId===id); if(!school)return;
    for(const st of APP.students.filter(s=>s.coordinator_npsn===school.npsn)) await dataSdk.delete(st);
    const r=await dataSdk.delete(school);
    if(r.isOk){ showToast('Sekolah berhasil dihapus ✅'); adminTab('schools'); }
    else showToast('Gagal hapus!','error');
  } else {
    const st=APP.students.find(s=>s.__backendId===id); if(!st)return;
    const r=await dataSdk.delete(st);
    if(r.isOk){ showToast('Peserta berhasil dihapus ✅'); adminTab('students'); }
    else showToast('Gagal hapus!','error');
  }
}

// ── Download Excel ──
function downloadExcel(){
  if(typeof XLSX==='undefined'){ showToast('Library Excel belum dimuat, coba lagi','warning'); return; }
  const wb=XLSX.utils.book_new();
  // Sheet 1: Rekap
  const byCategory={};
  Object.keys(SPORTS).forEach(s=>{ byCategory[s]={putra:0,putri:0,verified:0}; });
  APP.students.forEach(s=>{
    if(byCategory[s.sport]){
      if(s.sport_gender==='Putra')byCategory[s.sport].putra++;
      else byCategory[s.sport].putri++;
      if(s.verified==='true')byCategory[s.sport].verified++;
    }
  });
  const rekapData=[
    [`REKAPITULASI PESERTA O2SN KECAMATAN CIGOMBONG TAHUN ${APP.config.event_year||'2026'}`],
    [`Tanggal Cetak: ${new Date().toLocaleDateString('id-ID')}`],[],
    ['Cabang Olahraga','Putra','Putri','Total','Terverifikasi','%'],
    ...Object.entries(byCategory).map(([name,d])=>{
      const total=d.putra+d.putri;
      return [name,d.putra,d.putri,total,d.verified,total>0?`${Math.round(d.verified/total*100)}%`:'0%'];
    }),
    ['TOTAL',Object.values(byCategory).reduce((a,b)=>a+b.putra,0),Object.values(byCategory).reduce((a,b)=>a+b.putri,0),APP.students.length,APP.students.filter(s=>s.verified==='true').length,APP.students.length>0?`${Math.round(APP.students.filter(s=>s.verified==='true').length/APP.students.length*100)}%`:'0%']
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rekapData), 'Rekapitulasi');
  // Sheet 2: Detail
  const detailData=[
    ['No','Nama Peserta','NISN','Sekolah','Cabang Olahraga','Kategori','Kelas','Tempat Lahir','Tanggal Lahir','Jenis Kelamin','Agama','Koordinator','No HP Koordinator','Status Verifikasi','Tgl Daftar'],
    ...APP.students.map((s,i)=>[i+1,s.student_name,s.nisn||'-',s.school_name,s.sport,s.sport_gender,s.grade,s.birth_place,fmtDateShort(s.birth_date),s.gender,s.religion||'-',s.teacher_name,s.teacher_phone,s.verified==='true'?'Terverifikasi':'Menunggu',fmtDateShort(s.reg_date)])
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(detailData), 'Data Peserta');
  // Sheet 3 per cabang
  Object.entries(SPORTS).forEach(([sport,s])=>{
    const sportStudents=APP.students.filter(st=>st.sport===sport);
    if(sportStudents.length===0)return;
    const sheetData=[
      [`CABANG: ${sport}`],[],
      ['No','Nama','Sekolah','Kategori','Kelas','Status'],
      ...sportStudents.map((st,i)=>[i+1,st.student_name,st.school_name,st.sport_gender,st.grade,st.verified==='true'?'Terverifikasi':'Menunggu'])
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sheetData), sport.substring(0,28));
  });
  XLSX.writeFile(wb, `O2SN-Cigombong-${APP.config.event_year||'2026'}.xlsx`);
  showToast('File Excel berhasil diunduh ✅');
}
